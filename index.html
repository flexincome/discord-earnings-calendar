<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discord Members Only • Earnings Calendar</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    table { border-collapse: collapse; width: 100%; }
    th, td { padding: 14px 16px; text-align: left; }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen p-6 md:p-10">
  <div class="max-w-7xl mx-auto">
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-end mb-8 gap-4">
      <div>
        <h1 class="text-4xl md:text-5xl font-bold text-lime-400 tracking-tight">Earnings Calendar</h1>
        <p class="text-zinc-400 text-lg md:text-xl mt-2">Next 2 weeks • Options-implied moves • Auto-updates daily 8 AM EST</p>
      </div>
      <div id="last-updated" class="text-sm text-zinc-500 font-mono"></div>
    </div>

    <div class="overflow-x-auto rounded-2xl border border-zinc-800 bg-zinc-900 shadow-2xl">
      <table class="w-full text-sm" id="earnings-table">
        <thead class="bg-zinc-800 sticky top-0 z-10">
          <tr class="text-zinc-300 font-medium">
            <th class="font-mono">Symbol</th>
            <th>Company</th>
            <th>Date</th>
            <th>Time</th>
            <th class="text-right">EPS Est</th>
            <th class="text-right">% Move</th>
            <th class="text-right">$ Move</th>
            <th class="text-right">Price</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-zinc-800 text-zinc-200"></tbody>
      </table>
    </div>

    <p class="text-xs text-zinc-600 mt-8 text-center">
      Members-only • Powered by Finnhub + Yahoo Finance • Implied move = 1SD expected post-earnings volatility from ATM straddle
    </p>
  </div>

  <script>
    fetch('https://raw.githubusercontent.com/flexincome/discord-earnings-calendar/main/earnings.json')
      .then(response => {
        if (!response.ok) throw new Error('Failed to fetch earnings.json');
        return response.json();
      })
      .then(data => {
        const lastUpdatedEl = document.getElementById('last-updated');
        const date = new Date(data.last_updated);
        lastUpdatedEl.textContent = `Last updated: ${date.toLocaleString('en-US', {
          timeZone: 'America/New_York',
          month: 'short',
          day: 'numeric',
          year: 'numeric',
          hour: 'numeric',
          minute: '2-digit',
          hour12: true
        })} EST`;

        const tbody = document.querySelector('#earnings-table tbody');
        tbody.innerHTML = ''; // clear any placeholder

        data.data.forEach(row => {
          const pct = row.implied_pct;
          let pctClass = 'text-lime-400';
          if (pct > 8) pctClass = 'text-red-400 font-bold';
          else if (pct > 5) pctClass = 'text-orange-400 font-bold';
          else if (pct > 3) pctClass = 'text-yellow-400';

          const tr = document.createElement('tr');
          tr.className = 'hover:bg-zinc-800/70 transition-colors duration-150';
          tr.innerHTML = `
            <td class="font-mono text-lime-400 font-medium">${row.symbol}</td>
            <td class="font-medium">${row.company || row.symbol}</td>
            <td>${row.date}</td>
            <td>
              <span class="inline-block px-3 py-1 rounded-full text-xs font-medium uppercase tracking-wide ${
                row.time === 'BMO' ? 'bg-blue-600/30 text-blue-300 border border-blue-500/30' : 'bg-amber-600/30 text-amber-300 border border-amber-500/30'
              }">
                ${row.time}
              </span>
            </td>
            <td class="text-right font-mono">${row.eps_est !== null ? '$' + row.eps_est.toFixed(2) : '—'}</td>
            <td class="text-right font-medium ${pctClass}">${pct ? pct.toFixed(1) + '%' : '—'}</td>
            <td class="text-right font-mono">${row.implied_dollar ? '$' + row.implied_dollar.toFixed(2) : '—'}</td>
            <td class="text-right font-mono">${row.price ? '$' + row.price.toFixed(2) : '—'}</td>
          `;
          tbody.appendChild(tr);
        });
      })
      .catch(err => {
        document.getElementById('last-updated').innerHTML = 
          '<span class="text-red-400 font-medium">Error loading data — refresh page or check repo</span>';
        console.error(err);
      });
  </script>
</body>
</html>
