<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discord Members Only • Earnings Calendar</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body { font-family: system-ui, sans-serif; }</style>
</head>
<body class="bg-zinc-950 text-white min-h-screen p-6">
  <div class="max-w-7xl mx-auto" id="content" style="display:none">
    <div class="flex justify-between items-end mb-8">
      <div>
        <h1 class="text-5xl font-bold text-lime-400">Earnings Calendar</h1>
        <p class="text-zinc-400 text-xl">Next 2 weeks • Options-implied moves • Auto-updates daily 8 AM EST</p>
      </div>
      <div id="last-updated" class="text-sm text-zinc-500 font-mono"></div>
    </div>

    <div class="overflow-x-auto rounded-2xl border border-zinc-800 bg-zinc-900">
      <table class="w-full text-sm" id="earnings-table">
        <thead class="bg-zinc-800 sticky top-0">
          <tr>
            <th class="p-4 font-mono">Symbol</th>
            <th class="p-4">Company</th>
            <th class="p-4">Date</th>
            <th class="p-4">Time</th>
            <th class="p-4 text-right">EPS Est</th>
            <th class="p-4 text-right">% Move</th>
            <th class="p-4 text-right">$ Move</th>
            <th class="p-4 text-right">Price</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-zinc-800 text-zinc-300" id="table-body"></tbody>
      </table>
    </div>
  </div>

  <script>
    const correctPassword = "flex2026"; // ← change this anytime you want

    function showCalendar() {
      document.getElementById("content").style.display = "block";
      fetch('https://raw.githubusercontent.com/flexincome/discord-earnings-calendar/main/earnings.json')
        .then(r => r.json())
        .then(data => {
          document.getElementById("last-updated").textContent = 
            "Last updated: " + new Date(data.last_updated).toLocaleString("en-US", {timeZone: "America/New_York"}) + " EST";
          
          const tbody = document.getElementById("table-body");
          tbody.innerHTML = "";
          data.data.forEach(row => {
            const isBMO = row.time === "BMO";
            const tr = document.createElement("tr");
            tr.className = "hover:bg-zinc-800";
            tr.innerHTML = `
              <td class="p-4 font-mono text-lime-400">${row.symbol}</td>
              <td class="p-4">${row.company}</td>
              <td class="p-4">${row.date}</td>
              <td class="p-4">
                <span title="${isBMO ? 'Before Market Open (pre-market)' : 'After Market Close (post-market)'}" 
                      class="inline-block px-5 py-2 rounded-xl text-sm font-bold tracking-wide ${isBMO ? 'bg-blue-600 text-white' : 'bg-orange-600 text-white'}">
                  ${isBMO ? 'BMO' : 'AMC'}
                </span>
              </td>
              <td class="p-4 text-right">$${row.eps_est || '-'}</td>
              <td class="p-4 text-right font-bold ${row.implied_pct > 8 ? 'text-red-400' : row.implied_pct > 5 ? 'text-orange-400' : 'text-lime-400'}">
                ${row.implied_pct ? row.implied_pct + '%' : '—'}
              </td>
              <td class="p-4 text-right">$${row.implied_dollar || '—'}</td>
              <td class="p-4 text-right">$${row.price || '—'}</td>
            `;
            tbody.appendChild(tr);
          });
        });
    }

    const entered = prompt("🔒 Discord Members Only\nEnter the password:");
    if (entered === correctPassword) {
      showCalendar();
    } else {
      document.body.innerHTML = `<div class="min-h-screen bg-zinc-950 flex items-center justify-center text-3xl text-red-400">Access Denied</div>`;
    }
  </script>
</body>
</html>
